# ===================================================
# Task 13 - Employee REST API
# SQL Server Database Connection - localhost\SQLEXPRESS
# ===================================================

# --- DataSource Configuration ---
# Using SQL Server Authentication (sa account)
# Make sure 'sa' login is enabled in SSMS and SQL Server Auth is allowed
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=employee;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===================================================
# Hibernate / JPA Settings
# ===================================================
# ddl-auto=update: Auto creates/updates tables on startup
spring.jpa.hibernate.ddl-auto=update

# show-sql=true: Prints all SQL queries in console
spring.jpa.show-sql=true

# SQLServerDialect: Configures Hibernate for SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Format SQL output nicely in console
spring.jpa.properties.hibernate.format_sql=true

# ===================================================
# Server Configuration
# ===================================================
server.port=8080
