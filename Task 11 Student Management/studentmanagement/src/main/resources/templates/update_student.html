<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
 
<h2>Update Student</h2>
 
<form action="/saveStudent" method="post" th:object="${student}">
 
    <!-- Hidden field to carry the ID for update -->
    <input type="hidden" th:field="*{id}" />
 
    Name: <input type="text" th:field="*{name}" /><br><br>
    Department: <input type="text" th:field="*{department}" /><br><br>
    Age: <input type="number" th:field="*{age}" /><br><br>
    Marks: <input type="number" step="0.01" th:field="*{marks}" /><br><br>
 
    <button type="submit">Update Student</button>
 
</form>
 
<br>
<a href="/">Back to List</a>
 
</body>
</html>
